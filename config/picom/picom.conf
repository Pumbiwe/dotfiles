corner-radius = 16.0;
rounded-corners-exclude = [
  "class_g = 'i3bar'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'Dunst'",
];

shadow = true;
shadow-radius = 20;
shadow-opacity = 0.6;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-exclude = [
  "class_g = 'i3-frame'",
  "_GTK_FRAME_EXTENTS@:c"
];

inactive-opacity = 0.95;
active-opacity = 0.98;
frame-opacity = 0.9;

blur: {
  method = "dual_kawase";
  strength = 5;
}

backend = "xrender";
vsync = true;
